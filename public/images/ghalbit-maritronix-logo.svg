<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">GHALBIT MARITRONIX</title>
  <desc id="desc">Integrated Maritime and Land Intelligence Platform logo.</desc>
  <defs>
    <linearGradient id="blueGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#27f7ff"/>
      <stop offset="45%" stop-color="#00a8ff"/>
      <stop offset="100%" stop-color="#0756ff"/>
    </linearGradient>
    <linearGradient id="textGlow" x1="0%" y1="0%" x2="100%" y2="0%">
